name: Advanced Hardcoded CI Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  android-build:
    runs-on: ubuntu-latest
    env:
      JAVA_VERSION: '17'
      APK_OUT_DIR: app/build/outputs/apk
      ABI32: armeabi-v7a
      ABI64: arm64-v8a
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug and release (official behavior preserved)
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew --no-daemon clean assembleDebug assembleRelease

      - name: Validate ARM32 + ARM64 compatibility
        shell: bash
        run: |
          set -euo pipefail
          ./ci/validate-apk-abis.sh "$APK_OUT_DIR/debug" "debug" "$ABI32" "$ABI64"
          ./ci/validate-apk-abis.sh "$APK_OUT_DIR/release" "release" "$ABI32" "$ABI64"

      - name: Generate internal validation keystore
        shell: bash
        run: |
          set -euo pipefail
          keytool -genkeypair -v \
            -keystore ci-validation.jks \
            -storepass changeit \
            -keypass changeit \
            -alias ci-validation \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -dname "CN=CI Validation, OU=CI, O=Termux, L=NA, ST=NA, C=US"

      - name: Sign release APKs for internal validation
        shell: bash
        run: |
          set -euo pipefail
          BUILD_TOOLS_DIR="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n1)"
          for abi in "$ABI32" "$ABI64"; do
            RELEASE_APK="$(find "$APK_OUT_DIR/release" -maxdepth 1 -type f -name "termux-api-app_*-${abi}.apk" | head -n1)"
            SIGNED_APK="${RELEASE_APK%.apk}-ci-signed.apk"
            "$BUILD_TOOLS_DIR/apksigner" sign \
              --ks ci-validation.jks \
              --ks-pass pass:changeit \
              --key-pass pass:changeit \
              --ks-key-alias ci-validation \
              --out "$SIGNED_APK" \
              "$RELEASE_APK"
            "$BUILD_TOOLS_DIR/apksigner" verify "$SIGNED_APK"
          done

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          sha256sum app/build/outputs/apk/debug/*.apk > app/build/outputs/apk/debug/checksums-sha256.txt
          sha256sum app/build/outputs/apk/release/*.apk > app/build/outputs/apk/release/checksums-sha256.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: advanced-hardcoded-apks
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/debug/checksums-sha256.txt
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/release/checksums-sha256.txt
            ci-validation.jks
